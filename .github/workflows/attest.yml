# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
 
  pull_request:
    branches: [ "main" ]
    types: [closed]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      # Runs a single command using the runners shell
      - name: List of changed folders 
        id : changed-folders
        run: |
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$(git diff --name-only HEAD^ HEAD)" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        
      # Runs a set of commands using the runners shell
      - name: filer root folders
        id : root-folders
        run: |
          files=$(echo "${{ steps.changed-folders.outputs.files }}" | tr ' ' '\n')
          root_folders=$(echo $files | awk -F'/' '{if (NF=2) print $1}' | sort | uniq)
          echo "rootfolders<<EOF" >> "$GITHUB_OUTPUT"
          echo "${root-folders}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

     # Runs a single command using the runners shell
      - name: List of changed files 
        id : changed-files-list
        run: |
          git diff --name-only HEAD^1 HEAD >> changed_files.txt
          echo "changed files are:"
          cat changed_files.txt
          echo "changedfiles=$(cat changed_files.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

    # Runs a single command using the runners shell
      - name: Check OSAR 
        id : check_osar
        run: |
          CHANGED_FILES=$(echo "${{ steps.changed-files-list.outputs.changedfiles }}")
          echo "$CHANGED_FILES"
          TARGET_FOLDER="OSAR"
          for FILE in $CHANGED_FILES; do
             if [[ "$FILE" == *"$TARGET_FOLDER"* ]];then
                
                OLDIFS=$IFS
                IFS='/' read -ra SEGS <<< $FILE
                for seg in "${SEGS[@]}"; do
                   echo -e "$seg \n"
                   
                done
            
                IFS=$OLDIFS

                ProjectName=SEGS[0]
                Version=SEGS[1]

                fileindex=$(expr ${!SEGS[@]} - 2)
                FileName=SEGS[fileindex]

                echo -e "PN=$ProjectName \n VN=$Version \n File=$FileName \n"

                IsReady=$(jq -r 'CompletionStatus' "SFILE")

                echo "completion Status for file $FILE is $IsReady"

             fi
          done
